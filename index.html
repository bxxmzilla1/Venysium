<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Venysium</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#0f0f13"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="apple-touch-icon" href="/icon.svg"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;--bg2:#16161d;--bg3:#1e1e28;--bg4:#25252f;
  --border:#2e2e3a;--border2:#3a3a48;
  --text:#f0f0f5;--text2:#9090a8;--text3:#55556a;
  --accent:#5b8af0;--accent2:#7aa3ff;--accent-bg:rgba(91,138,240,0.12);
  --green:#3ecf8e;--green-bg:rgba(62,207,142,0.1);
  --red:#f06060;--sent:#5b8af0;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:10px;--r2:14px;
}
html,body{height:100%;width:100%;background:var(--bg);font-family:var(--font);color:var(--text);font-size:14px;overflow:hidden}
body{display:flex;margin:0;padding:0}
#app{display:flex;width:100%;height:100vh;border-radius:0;overflow:hidden;border:none;background:var(--bg);position:relative}

/* SIDEBAR */
#sidebar{width:230px;background:var(--bg2);display:flex;flex-direction:column;border-right:1px solid var(--border);flex-shrink:0}
#sidebar-brand{padding:20px 16px 15px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.brand-icon{width:32px;height:32px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon svg{width:17px;height:17px}
#sidebar-brand h1{font-size:15px;font-weight:500;color:var(--text);letter-spacing:-0.02em}
#sidebar-brand span{font-size:10px;color:var(--text3);display:block;margin-top:1px}
#srv-status{display:flex;align-items:center;gap:6px;padding:8px 16px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text3)}
.srv-pip{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;transition:background .3s}
.srv-pip.ok{background:var(--green)}
#accounts-section{padding:12px 12px 6px;display:flex;align-items:center;justify-content:space-between}
#accounts-section label{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)}
#add-btn{width:24px;height:24px;border-radius:6px;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;font-family:var(--font)}
#add-btn:hover{background:var(--bg4);border-color:var(--accent);color:var(--accent)}
#accounts-list{flex:1;overflow-y:auto;padding:0 8px 8px}
#accounts-list::-webkit-scrollbar{width:3px}
#accounts-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.acc-item{display:flex;align-items:center;gap:9px;padding:9px 8px;border-radius:10px;cursor:pointer;transition:background .12s;margin-bottom:2px;position:relative}
.acc-item:hover{background:var(--bg3)}
.acc-item.active{background:var(--accent-bg)}
.acc-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:22px;border-radius:0 2px 2px 0;background:var(--accent)}
.acc-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;position:relative}
.acc-av .online-ring{position:absolute;bottom:0;right:0;width:9px;height:9px;border-radius:50%;background:var(--green);border:2px solid var(--bg2)}
.acc-info{flex:1;min-width:0}
.acc-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acc-phone{font-size:10px;color:var(--text3);margin-top:1px;font-family:var(--mono)}

/* DIALOGS */
#dialogs-col{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
#dlg-search{padding:10px 12px;border-bottom:1px solid var(--border)}
#dlg-search input{width:100%;padding:8px 11px;border-radius:9px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:12px;outline:none;font-family:var(--font)}
#dlg-search input::placeholder{color:var(--text3)}
#dlg-search input:focus{border-color:var(--accent)}
#dlg-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.dlg-tab{flex:1;padding:9px 0;font-size:11px;font-weight:500;color:var(--text3);text-align:center;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s}
.dlg-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.dlg-tab:hover:not(.active){color:var(--text2)}
#dialogs-list{flex:1;overflow-y:auto}
#dialogs-list::-webkit-scrollbar{width:3px}
#dialogs-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.dlg-item{padding:11px 13px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;position:relative}
.dlg-item:hover{background:var(--bg3)}
.dlg-item.active{background:var(--accent-bg)}
.dlg-item.active::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.dlg-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.dlg-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.dlg-time{font-size:10px;color:var(--text3);flex-shrink:0;font-family:var(--mono)}
.dlg-preview{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.unread-badge{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:var(--accent);color:#fff;font-size:9px;font-weight:500;margin-left:4px}

/* CHAT */
#chat-col{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
#chat-header{padding:14px 20px;border-bottom:1px solid var(--border);display:none;align-items:center;gap:12px;background:var(--bg2)}
.chat-av{width:36px;height:36px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--accent2);flex-shrink:0}
#chat-name{font-size:14px;font-weight:500;color:var(--text)}
#chat-sub{font-size:11px;color:var(--text3);margin-top:2px}
#chat-actions{margin-left:auto;display:flex;gap:6px}
.hdr-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .12s}
.hdr-btn:hover{background:var(--bg4);color:var(--text)}
#chat-msgs{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:10px}
#chat-msgs::-webkit-scrollbar{width:3px}
#chat-msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3)}
.empty-icon{width:52px;height:52px;border-radius:14px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px}
.empty-state p{font-size:13px}
.date-sep{text-align:center;font-size:10px;color:var(--text3);margin:4px 0;font-family:var(--mono);letter-spacing:.04em}
.msg{max-width:70%;display:flex;flex-direction:column;gap:3px;animation:msgIn .18s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.sent{align-self:flex-end;align-items:flex-end}
.msg.recv{align-self:flex-start}
.bubble{padding:9px 14px;border-radius:16px;font-size:13px;line-height:1.55;word-break:break-word}
.msg.sent .bubble{background:var(--sent);color:#fff;border-bottom-right-radius:4px}
.msg.recv .bubble{background:var(--bg3);color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--border)}
.msg-time{font-size:10px;color:var(--text3);font-family:var(--mono);padding:0 4px}
#input-wrap{padding:14px 18px;border-top:1px solid var(--border);background:var(--bg2);display:none;align-items:center;gap:10px}
#msg-input{flex:1;padding:10px 15px;border-radius:12px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:13px;outline:none;font-family:var(--font);transition:border-color .15s}
#msg-input::placeholder{color:var(--text3)}
#msg-input:focus{border-color:var(--accent)}
#send-btn{width:38px;height:38px;border-radius:11px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
#send-btn:hover{background:var(--accent2);transform:scale(1.05)}
#send-btn:active{transform:scale(.96)}

/* MODAL */
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:100;border-radius:18px;backdrop-filter:blur(6px)}
.modal{background:var(--bg2);border-radius:18px;padding:28px;width:310px;border:1px solid var(--border2);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.93) translateY(10px)}to{opacity:1;transform:none}}
.modal-icon{width:46px;height:46px;border-radius:13px;background:var(--accent-bg);border:1px solid rgba(91,138,240,.25);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.modal h3{font-size:17px;font-weight:500;color:var(--text);margin-bottom:5px;letter-spacing:-0.02em}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:20px;line-height:1.6}
.steps{display:flex;gap:5px;margin-bottom:20px}
.sdot{height:3px;border-radius:2px;background:var(--border2);flex:1;transition:background .25s}
.sdot.on{background:var(--accent)}
.modal input{width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;outline:none;margin-bottom:10px;font-family:var(--font);transition:border-color .15s}
.modal input::placeholder{color:var(--text3)}
.modal input:focus{border-color:var(--accent)}
.modal-row{display:flex;gap:8px;margin-top:4px}
.btn-p{flex:1;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:var(--font)}
.btn-p:hover{background:var(--accent2)}
.btn-p:disabled{opacity:.45;cursor:not-allowed}
.btn-s{flex:1;padding:11px;background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:10px;font-size:13px;cursor:pointer;font-family:var(--font);transition:all .15s}
.btn-s:hover{background:var(--bg4);color:var(--text)}
.otp-row{display:flex;gap:8px;margin-bottom:12px}
.otp-box{flex:1;height:52px;border:1px solid var(--border2);border-radius:10px;text-align:center;font-size:22px;font-weight:500;background:var(--bg3);color:var(--text);outline:none;font-family:var(--mono);transition:border-color .15s}
.otp-box:focus{border-color:var(--accent)}
.err{font-size:11px;color:var(--red);margin-bottom:8px;padding:8px 11px;background:rgba(240,96,96,.08);border-radius:8px;border:1px solid rgba(240,96,96,.2);display:none}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.success-check{width:52px;height:52px;border-radius:50%;background:var(--green-bg);border:1px solid rgba(62,207,142,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px;color:var(--green)}
.loader-ring{width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8l-1.68 7.92c-.12.56-.46.7-.92.44l-2.56-1.88-1.24 1.2c-.14.14-.26.26-.52.26l.18-2.62 4.72-4.26c.2-.18-.04-.28-.32-.1L8.38 14.4l-2.5-.78c-.54-.17-.55-.54.12-.8l9.76-3.76c.44-.16.84.1.88.74z" fill="white"/></svg>
      </div>
      <div><h1>Venysium</h1><span>Messaging hub</span></div>
    </div>
    <div id="srv-status"><div id="srv-pip" class="srv-pip"></div><span id="srv-label">Connecting...</span></div>
    <div id="accounts-section"><label>Accounts</label><button id="add-btn" onclick="openModal()">+</button></div>
    <div id="accounts-list"><div style="padding:16px 12px;font-size:11px;color:var(--text3)">No accounts yet</div></div>
  </div>

  <div id="dialogs-col">
    <div id="dlg-search"><input id="search-input" placeholder="Search conversations..." oninput="filterDialogs(this.value)"/></div>
    <div id="dlg-tabs">
      <div class="dlg-tab active" onclick="setTab('chats')">Chats</div>
      <div class="dlg-tab" onclick="setTab('groups')">Groups & Channels</div>
    </div>
    <div id="dialogs-list">
      <div class="empty-state" style="padding-top:60px"><div class="empty-icon">💬</div><p>Select an account</p></div>
    </div>
  </div>

  <div id="chat-col">
    <div id="chat-header">
      <div class="chat-av" id="chat-av">?</div>
      <div><div id="chat-name"></div><div id="chat-sub"></div></div>
      <div id="chat-actions">
        <button class="hdr-btn" title="Search">⌕</button>
        <button class="hdr-btn" title="Info">ℹ</button>
      </div>
    </div>
    <div id="chat-msgs" class="empty-state">
      <div class="empty-icon">💬</div>
      <p>Select a conversation to begin</p>
    </div>
    <div id="input-wrap">
      <input id="msg-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"/>
      <button id="send-btn" onclick="sendMsg()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <div id="modal-root"></div>
</div>

<script>
// Electron loads via file:// — point to local server. Web → relative /api paths.
const IS_ELECTRON = location.protocol === 'file:';
const BASE = IS_ELECTRON ? 'http://localhost:3333' : '';
const API = BASE + '/api';

const PALETTES=[['#3b5bdb','#1c3799'],['#0ca678','#096b52'],['#e8590c','#b54309'],['#9c36b5','#6d23a0'],['#1971c2','#0d4f8a'],['#c2255c','#8f1b47']];
let state={accounts:[],activeAcc:null,dialogs:[],allDialogs:[],activeDlg:null,messages:[],serverOk:false,activeTab:'chats'};
let phoneCodeHash='',pendingPhone='',pendingSession='';

// LocalStorage helpers
function storedAccounts(){try{return JSON.parse(localStorage.getItem('venysium_accounts')||'[]');}catch{return[];}}
function saveAccounts(accs){localStorage.setItem('venysium_accounts',JSON.stringify(accs));}

async function checkServer(){
  try{
    const r=await fetch(API+'/health',{signal:AbortSignal.timeout(4000)});
    if(r.ok){state.serverOk=true;document.getElementById('srv-pip').className='srv-pip ok';document.getElementById('srv-label').textContent='Server connected';loadAccounts();}
  }catch{document.getElementById('srv-label').textContent=IS_ELECTRON?'Server offline — restart app':'Connecting...';}
}

function loadAccounts(){
  state.accounts=storedAccounts();renderAccounts();
}

function initials(name){return(name||'').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase()||'?'}

function renderAccounts(){
  const el=document.getElementById('accounts-list');
  if(!state.accounts.length){el.innerHTML='<div style="padding:16px 12px;font-size:11px;color:var(--text3)">No accounts yet</div>';return;}
  el.innerHTML=state.accounts.map((a,i)=>{
    const [bg]=PALETTES[i%PALETTES.length];
    return`<div class="acc-item${state.activeAcc?.phone===a.phone?' active':''}" onclick="selectAccount('${esc(a.phone)}')">
      <div class="acc-av" style="background:${bg}22;color:${bg}">${initials(a.name)}<div class="online-ring"></div></div>
      <div class="acc-info"><div class="acc-name">${esc(a.name)}</div><div class="acc-phone">${esc(a.phone||'')}</div></div>
    </div>`;
  }).join('');
}

async function selectAccount(phone){
  if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
  if(dialogPollTimer){clearInterval(dialogPollTimer);dialogPollTimer=null;}
  state.activeAcc=state.accounts.find(a=>a.phone===phone);
  state.activeDlg=null;state.messages=[];
  renderAccounts();
  document.getElementById('dialogs-list').innerHTML='<div class="empty-state" style="padding-top:60px"><div class="loader-ring"></div></div>';
  document.getElementById('chat-msgs').className='empty-state';
  document.getElementById('chat-msgs').innerHTML='<div class="empty-icon">💬</div><p>Select a conversation</p>';
  document.getElementById('chat-header').style.display='none';
  document.getElementById('input-wrap').style.display='none';
  const dialogs=await fetch(`${API}/dialogs`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+state.activeAcc.session},body:'{}'}).then(r=>r.json()).catch(()=>[]);
  state.allDialogs=dialogs;filterDialogs(document.getElementById('search-input').value);
  if(dialogPollTimer)clearInterval(dialogPollTimer);
  dialogPollTimer=setInterval(pollDialogs,30000);
}

function setTab(tab){
  state.activeTab=tab;
  document.querySelectorAll('.dlg-tab').forEach((el,i)=>{
    el.classList.toggle('active',(i===0&&tab==='chats')||(i===1&&tab==='groups'));
  });
  filterDialogs(document.getElementById('search-input').value);
}

function filterDialogs(q){
  const base=state.allDialogs.filter(d=>
    d.id==='777000' ? false :
    state.activeTab==='chats' ? d.isUser : (d.isGroup||d.isChannel)
  );
  state.dialogs=q?base.filter(d=>d.name.toLowerCase().includes(q.toLowerCase())):base;
  renderDialogs();
}

function fmtTime(ts){if(!ts)return'';const d=new Date(ts*1000);return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');}

function renderDialogs(){
  const el=document.getElementById('dialogs-list');
  if(!state.dialogs.length){el.innerHTML='<div class="empty-state" style="padding-top:60px"><p>No conversations</p></div>';return;}
  el.innerHTML=state.dialogs.map(d=>`
    <div class="dlg-item${state.activeDlg?.id===d.id?' active':''}" onclick="selectDialog('${d.id}','${esc(d.name)}')">
      <div class="dlg-top"><span class="dlg-name">${esc(d.name)}</span><span class="dlg-time">${fmtTime(d.date)}</span></div>
      <div class="dlg-preview">${esc(d.lastMessage||'No messages')}${d.unreadCount>0?`<span class="unread-badge">${d.unreadCount}</span>`:''}</div>
    </div>`).join('');
}

let pollTimer=null;
let dialogPollTimer=null;

async function selectDialog(id,name){
  if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
  state.activeDlg={id,name};renderDialogs();
  const el=document.getElementById('chat-msgs');
  el.className='';el.style.cssText='flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:10px';
  el.innerHTML='<div style="text-align:center;font-size:11px;color:var(--text3)">Loading...</div>';
  document.getElementById('chat-name').textContent=name;
  document.getElementById('chat-sub').textContent='via '+(state.activeAcc?.name||'');
  document.getElementById('chat-av').textContent=initials(name);
  document.getElementById('chat-header').style.display='flex';
  document.getElementById('input-wrap').style.display='flex';
  const msgs=await fetch(`${API}/messages`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+state.activeAcc.session},body:JSON.stringify({peerId:id})}).then(r=>r.json()).catch(()=>[]);
  state.messages=msgs;renderMessages();
  pollTimer=setInterval(()=>pollMessages(id),2000);
}

async function pollMessages(id){
  if(!state.activeAcc||!state.activeDlg||state.activeDlg.id!==id)return;
  const msgs=await fetch(`${API}/messages`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+state.activeAcc.session},body:JSON.stringify({peerId:id})}).then(r=>r.json()).catch(()=>null);
  if(!msgs)return;
  const lastKnown=state.messages.at(-1)?.id;
  const lastNew=msgs.at(-1)?.id;
  if(lastNew!==lastKnown){
    const el=document.getElementById('chat-msgs');
    const atBottom=el.scrollHeight-el.scrollTop-el.clientHeight<60;
    state.messages=msgs;renderMessages(atBottom);
    // Update this dialog's preview in the list locally (no extra API call)
    const latest=msgs.at(-1);
    if(latest){
      const dlg=state.allDialogs.find(d=>d.id===id);
      if(dlg){dlg.lastMessage=latest.text?.slice(0,60)||'';dlg.date=latest.date;dlg.unreadCount=0;}
      filterDialogs(document.getElementById('search-input').value);
    }
  }
}

async function pollDialogs(){
  if(!state.activeAcc)return;
  const dialogs=await fetch(`${API}/dialogs`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+state.activeAcc.session},body:'{}'}).then(r=>r.json()).catch(()=>null);
  if(!dialogs)return;
  state.allDialogs=dialogs;
  filterDialogs(document.getElementById('search-input').value);
}

function renderMessages(scroll=true){
  const el=document.getElementById('chat-msgs');
  if(!state.messages.length){el.innerHTML='<div style="text-align:center;font-size:11px;color:var(--text3);padding-top:30px">No messages</div>';return;}
  el.innerHTML=state.messages.map((m,i)=>{
    const prev=state.messages[i-1];
    const showDate=!prev||new Date(m.date*1000).toDateString()!==new Date(prev.date*1000).toDateString();
    const dateStr=showDate?`<div class="date-sep">${new Date(m.date*1000).toLocaleDateString('en',{month:'short',day:'numeric'})}</div>`:'';
    return`${dateStr}<div class="msg ${m.fromMe?'sent':'recv'}"><div class="bubble">${esc(m.text||'')}</div><div class="msg-time">${fmtTime(m.date)}</div></div>`;
  }).join('');
  if(scroll)el.scrollTop=el.scrollHeight;
}

async function sendMsg(){
  const input=document.getElementById('msg-input');
  const text=input.value.trim();
  if(!text||!state.activeDlg||!state.activeAcc)return;
  input.value='';
  await fetch(`${API}/send`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+state.activeAcc.session},body:JSON.stringify({peerId:state.activeDlg.id,text})}).catch(()=>{});
  state.messages.push({id:Date.now(),text,date:Math.floor(Date.now()/1000),fromMe:true});
  renderMessages();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

let mStep=1;
function openModal(){
  if(!state.serverOk){alert('Server not connected. Please wait or restart the app.');return;}
  mStep=1;renderModal();
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

function renderModal(){
  const r=document.getElementById('modal-root');
  if(mStep===1){
    r.innerHTML=`<div class="modal-bg"><div class="modal">
      <div class="modal-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8l-1.68 7.92c-.12.56-.46.7-.92.44l-2.56-1.88-1.24 1.2c-.14.14-.26.26-.52.26l.18-2.62 4.72-4.26c.2-.18-.04-.28-.32-.1L8.38 14.4l-2.5-.78c-.54-.17-.55-.54.12-.8l9.76-3.76c.44-.16.84.1.88.74z" fill="var(--accent)"/></svg></div>
      <h3>Add account</h3>
      <p class="modal-sub">Enter your Telegram phone number to log in via MTProto</p>
      <div class="steps"><div class="sdot on"></div><div class="sdot"></div><div class="sdot"></div></div>
      <input id="m-phone" type="tel" placeholder="+1 555 000 0000"/>
      <div id="m-err" class="err"></div>
      <div class="modal-row"><button class="btn-s" onclick="closeModal()">Cancel</button><button class="btn-p" id="m-btn" onclick="submitPhone()">Send code</button></div>
    </div></div>`;
    setTimeout(()=>document.getElementById('m-phone')?.focus(),50);
  } else if(mStep===2){
    r.innerHTML=`<div class="modal-bg"><div class="modal">
      <div class="modal-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" stroke="var(--accent)" stroke-width="2"/><path d="M7 11V7a5 5 0 0110 0v4" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/></svg></div>
      <h3>Enter the code</h3>
      <p class="modal-sub">Telegram sent a verification code to <strong style="color:var(--text)">${pendingPhone}</strong></p>
      <div class="steps"><div class="sdot"></div><div class="sdot on"></div><div class="sdot"></div></div>
      <div class="otp-row">${[0,1,2,3,4].map(i=>`<input class="otp-box" id="otp${i}" maxlength="1" oninput="otpNext(${i})" onkeydown="otpBack(event,${i})"/>`).join('')}</div>
      <div id="m-err" class="err"></div>
      <div class="modal-row"><button class="btn-s" onclick="mStep=1;renderModal()">Back</button><button class="btn-p" id="m-btn" onclick="submitCode()">Verify</button></div>
    </div></div>`;
    setTimeout(()=>document.getElementById('otp0')?.focus(),50);
  } else if(mStep==='2fa'){
    r.innerHTML=`<div class="modal-bg"><div class="modal">
      <div class="modal-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5L12 1z" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/></svg></div>
      <h3>Two-step verification</h3>
      <p class="modal-sub">This account has 2FA enabled. Enter your Telegram cloud password.</p>
      <div class="steps"><div class="sdot"></div><div class="sdot on"></div><div class="sdot"></div></div>
      <input id="m-2fa" type="password" placeholder="Cloud password"/>
      <div id="m-err" class="err"></div>
      <div class="modal-row"><button class="btn-s" onclick="closeModal()">Cancel</button><button class="btn-p" onclick="submit2FA()">Confirm</button></div>
    </div></div>`;
    setTimeout(()=>document.getElementById('m-2fa')?.focus(),50);
  } else if(mStep===3){
    r.innerHTML=`<div class="modal-bg"><div class="modal" style="text-align:center">
      <div class="steps" style="margin-bottom:22px"><div class="sdot"></div><div class="sdot"></div><div class="sdot on"></div></div>
      <div class="success-check">✓</div>
      <h3 style="margin-bottom:6px">Connected!</h3>
      <p class="modal-sub">${pendingPhone} is now in your CRM</p>
      <button class="btn-p" style="width:100%;margin-top:6px" onclick="closeModal()">Done</button>
    </div></div>`;
  }
}

function setErr(msg){const e=document.getElementById('m-err');if(e){e.textContent=msg;e.style.display=msg?'block':'none';}}
function setLoading(on,label='Processing...'){const b=document.getElementById('m-btn');if(b){b.disabled=on;b.innerHTML=on?`<span class="spin"></span>${label}`:b.dataset.orig||'Send code';if(!on&&!b.dataset.orig)b.dataset.orig=b.textContent;}}

async function submitPhone(){
  const phone=document.getElementById('m-phone').value.trim();
  if(!phone){setErr('Enter your phone number');return;}
  pendingPhone=phone;
  const btn=document.getElementById('m-btn');
  if(btn)btn.dataset.orig='Send code';
  setLoading(true,'Sending...');setErr('');
  try{
    const r=await fetch(API+'/auth/send-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'Failed to send code');
    phoneCodeHash=d.phoneCodeHash;pendingSession=d.pendingSession;mStep=2;renderModal();
  }catch(e){setErr(e.message);setLoading(false);}
}

function otpNext(i){const el=document.getElementById('otp'+i);if(el.value&&i<4)document.getElementById('otp'+(i+1)).focus();}
function otpBack(e,i){if(e.key==='Backspace'&&!document.getElementById('otp'+i).value&&i>0)document.getElementById('otp'+(i-1)).focus();}

async function submitCode(){
  const code=[0,1,2,3,4].map(i=>document.getElementById('otp'+i).value).join('');
  if(code.length<5){setErr('Enter the full 5-digit code');return;}
  const btn=document.getElementById('m-btn');if(btn)btn.dataset.orig='Verify';
  setLoading(true,'Verifying...');setErr('');
  try{
    const r=await fetch(API+'/auth/verify-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:pendingPhone,code,phoneCodeHash,pendingSession})});
    const d=await r.json();
    if(r.status===202&&d.requires2FA){pendingSession=d.pendingSession;mStep='2fa';renderModal();return;}
    if(!r.ok)throw new Error(d.error||'Wrong code');
    addAccount(d.account,d.session);mStep=3;renderModal();
  }catch(e){setErr(e.message);setLoading(false);}
}

async function submit2FA(){
  const pw=document.getElementById('m-2fa').value;
  if(!pw){setErr('Enter your password');return;}
  try{
    const r=await fetch(API+'/auth/verify-2fa',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw,pendingSession})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'Wrong password');
    addAccount(d.account,d.session);mStep=3;renderModal();
  }catch(e){setErr(e.message);}
}

function addAccount(account,session){
  const accs=storedAccounts();
  const existing=accs.findIndex(a=>a.phone===account.phone);
  const entry={...account,session};
  if(existing>=0)accs[existing]=entry;else accs.push(entry);
  saveAccounts(accs);
  state.accounts=accs;
  renderAccounts();
}

if('serviceWorker' in navigator && !IS_ELECTRON){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}

checkServer();
</script>
